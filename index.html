<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learn Hindi Interactive</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;700&family=Poppins:wght@400;600&display=swap');

        :root {
            --bg-color: #fce4ec;
            --card-bg: #ffffff;
            --text-main: #212121;
            --text-muted: #757575;
            --accent: #e91e63;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .app-container {
            text-align: center;
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 24px;
            padding: 40px 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            min-height: 300px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
        }

        .hindi-word {
            font-family: 'Noto Sans Devanagari', sans-serif;
            font-size: 5rem;
            font-weight: 700;
            margin: 0;
            line-height: 1.2;
        }

        .breakdown-container {
            display: flex;
            gap: 20px;
            margin-top: 30px;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.5s ease;
        }

        .letter-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #f5f5f5;
            padding: 15px;
            border-radius: 12px;
            min-width: 60px;
        }

        .letter-hindi {
            font-family: 'Noto Sans Devanagari', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent);
        }

        .letter-phonetic {
            font-size: 1.1rem;
            color: var(--text-muted);
            margin-top: 5px;
        }

        .translation-container {
            margin-top: 30px;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.5s ease;
        }

        .word-phonetic {
            font-size: 1.8rem;
            font-weight: 600;
            color: var(--accent);
        }

        .word-english {
            font-size: 1.2rem;
            color: var(--text-muted);
            margin-top: 5px;
        }

        .action-btn {
            margin-top: 40px;
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(233, 30, 99, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
            font-family: 'Poppins', sans-serif;
        }

        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(233, 30, 99, 0.4);
        }

        .progress {
            margin-bottom: 20px;
            font-size: 0.9rem;
            color: var(--text-muted);
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Utility classes for animations */
        .visible {
            opacity: 1;
            transform: translateY(0);
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="progress" id="progress-text">Word 1 of 5</div>
        
        <div class="card" id="lesson-card">
            <div class="hindi-word" id="main-word">...</div>
            
            <div class="breakdown-container" id="breakdown-container">
                </div>
            
            <div class="translation-container" id="translation-container">
                <div class="word-phonetic" id="word-phonetic">...</div>
                <div class="word-english" id="word-english">...</div>
            </div>
        </div>

        <button class="action-btn" id="action-btn" onclick="advanceLesson()">Start Learning</button>
    </div>

    <script>
        // Data structure for the lessons
        const words = [
            {
                word: "कल",
                letters: [
                    { char: "क", phonetic: "ka" },
                    { char: "ल", phonetic: "la" }
                ],
                phonetic: "kal",
                english: "Tomorrow / Yesterday"
            },
            {
                word: "घर",
                letters: [
                    { char: "घ", phonetic: "gha" },
                    { char: "र", phonetic: "ra" }
                ],
                phonetic: "ghar",
                english: "House"
            },
            {
                word: "नाम",
                letters: [
                    { char: "ना", phonetic: "naa" },
                    { char: "म", phonetic: "ma" }
                ],
                phonetic: "naam",
                english: "Name"
            },
            {
                word: "पानी",
                letters: [
                    { char: "पा", phonetic: "paa" },
                    { char: "नी", phonetic: "nee" }
                ],
                phonetic: "paani",
                english: "Water"
            },
            {
                word: "किताब",
                letters: [
                    { char: "कि", phonetic: "ki" },
                    { char: "ता", phonetic: "taa" },
                    { char: "ब", phonetic: "ba" }
                ],
                phonetic: "kitaab",
                english: "Book"
            }
        ];

        let currentWordIndex = 0;
        let step = 0; // 0: initial/next word, 1: show breakdown, 2: show translation

        // DOM Elements
        const mainWordEl = document.getElementById("main-word");
        const breakdownContainerEl = document.getElementById("breakdown-container");
        const translationContainerEl = document.getElementById("translation-container");
        const wordPhoneticEl = document.getElementById("word-phonetic");
        const wordEnglishEl = document.getElementById("word-english");
        const actionBtnEl = document.getElementById("action-btn");
        const progressTextEl = document.getElementById("progress-text");

        // Initialize the app state
        function initApp() {
            mainWordEl.innerHTML = "नमस्ते";
            mainWordEl.style.fontSize = "4rem";
            breakdownContainerEl.classList.add("hidden");
            translationContainerEl.classList.add("hidden");
            progressTextEl.innerHTML = "Welcome to Hindi Learn";
            actionBtnEl.innerHTML = "Start Learning";
        }

        function loadWord() {
            const currentData = words[currentWordIndex];
            
            // Reset UI for new word
            mainWordEl.style.fontSize = "5rem";
            mainWordEl.innerHTML = currentData.word;
            progressTextEl.innerHTML = `Word ${currentWordIndex + 1} of ${words.length}`;
            
            // Generate Breakdown HTML
            breakdownContainerEl.innerHTML = "";
            currentData.letters.forEach(letter => {
                const group = document.createElement("div");
                group.className = "letter-group";
                group.innerHTML = `
                    <div class="letter-hindi">${letter.char}</div>
                    <div class="letter-phonetic">${letter.phonetic}</div>
                `;
                breakdownContainerEl.appendChild(group);
            });

            // Set translation data
            wordPhoneticEl.innerHTML = `"${currentData.phonetic}"`;
            wordEnglishEl.innerHTML = currentData.english;

            // Hide the lower sections
            breakdownContainerEl.classList.remove("visible");
            translationContainerEl.classList.remove("visible");
            
            // Make sure they are in the DOM but transparent
            breakdownContainerEl.classList.remove("hidden");
            translationContainerEl.classList.remove("hidden");

            actionBtnEl.innerHTML = "Break it down";
            step = 1;
        }

        function advanceLesson() {
            if (step === 0) {
                // First click, load the first word
                loadWord();
            } 
            else if (step === 1) {
                // Show the individual letters and their sounds
                breakdownContainerEl.classList.add("visible");
                actionBtnEl.innerHTML = "Show Meaning";
                step = 2;
            } 
            else if (step === 2) {
                // Show the combined phonetic word and English translation
                translationContainerEl.classList.add("visible");
                if (currentWordIndex === words.length - 1) {
                    actionBtnEl.innerHTML = "Start Over";
                    step = 3; // end of array
                } else {
                    actionBtnEl.innerHTML = "Next Word";
                    step = 0; // reset for next word
                    currentWordIndex++;
                }
            }
            else if (step === 3) {
                // Restart loop
                currentWordIndex = 0;
                loadWord();
            }
        }

        // Boot
        initApp();
    </script>
</body>
</html>
