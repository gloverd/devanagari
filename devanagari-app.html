<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learn Hindi - Advanced</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;600;700&family=Poppins:wght@400;500;600;700&display=swap');

        :root {
            --bg-color: #fbe6ee;
            --card-bg: #ffffff;
            --text-dark: #1a1a1a;
            --text-grey: #8a8a8a;
            --accent-pink: #d81b60;
            --box-bg: #f4f4f4;
            --success: #4caf50;
            --error: #f44336;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Top Tracker */
        .alphabet-tracker {
            width: 100%;
            background: rgba(0,0,0,0.05);
            padding: 10px 0;
            text-align: center;
            font-family: 'Noto Sans Devanagari', sans-serif;
            font-size: 1.2rem;
            white-space: nowrap;
            overflow-x: auto;
            margin-bottom: 20px;
            user-select: none;
        }
        .tracker-char {
            margin: 0 5px;
            transition: opacity 0.3s;
            color: var(--text-dark);
        }

        /* Controls */
        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .mode-btn {
            background: rgba(255,255,255,0.5);
            border: 2px solid transparent;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            color: var(--text-grey);
            transition: all 0.2s;
        }
        .mode-btn.active {
            background: var(--card-bg);
            border-color: var(--accent-pink);
            color: var(--accent-pink);
        }

        /* Main UI */
        .progress-text {
            color: #6a6a6a;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 32px;
            padding: 50px 40px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 15px 35px rgba(216, 27, 96, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            margin-bottom: 40px;
        }

        /* Massive Devanagari Word & Tooltips */
        .main-word {
            font-family: 'Noto Sans Devanagari', sans-serif;
            font-size: 7rem;
            font-weight: 700;
            line-height: 1;
            margin-bottom: 40px;
            display: flex;
            justify-content: center;
        }
        
        .word-char {
            transition: opacity 0.3s ease, color 0.3s ease;
            position: relative;
            cursor: pointer; /* Suggests it can be interacted with */
        }
        .word-char.faded {
            opacity: 0.15;
        }

        /* Tooltip CSS */
        .word-char::after {
            content: attr(data-roman);
            position: absolute;
            bottom: 105%;
            left: 50%;
            transform: translateX(-50%) translateY(10px);
            background-color: var(--text-dark);
            color: #fff;
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 1.2rem;
            font-family: 'Poppins', sans-serif;
            font-weight: 500;
            opacity: 0;
            pointer-events: none;
            transition: all 0.2s ease;
            white-space: nowrap;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            z-index: 100;
        }
        .word-char:hover::after,
        .word-char:active::after {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* Breakdown Boxes */
        .breakdown-area {
            display: flex;
            gap: 20px;
            min-height: 140px;
            justify-content: center;
            align-items: center;
            width: 100%;
            flex-wrap: wrap;
        }

        .letter-box {
            background: var(--box-bg);
            border-radius: 16px;
            width: 100px;
            height: 130px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .letter-box.clickable:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .box-hindi {
            font-family: 'Noto Sans Devanagari', sans-serif;
            font-size: 3rem;
            font-weight: 700;
            color: var(--accent-pink);
            line-height: 1.2;
        }
        .box-roman {
            font-size: 1.2rem;
            color: var(--text-grey);
            margin-top: 5px;
        }
        .box-question {
            font-size: 4rem;
            color: #ccc;
            font-weight: 700;
        }

        /* Quiz Input */
        .quiz-input {
            width: 80%;
            background: transparent;
            border: none;
            border-bottom: 3px solid #ccc;
            text-align: center;
            font-size: 1.5rem;
            font-family: 'Poppins', sans-serif;
            color: var(--accent-pink);
            padding: 5px;
            outline: none;
            transition: border-color 0.3s;
        }
        .quiz-input:focus {
            border-bottom-color: var(--accent-pink);
        }

        /* Review Translation */
        .translation {
            margin-top: 20px;
            text-align: center;
            font-size: 1.4rem;
            color: var(--text-grey);
            font-weight: 500;
        }

        /* Action Button */
        .action-btn {
            margin-top: 40px;
            background: var(--accent-pink);
            color: white;
            border: none;
            padding: 16px 40px;
            font-size: 1.2rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            transition: background 0.2s, transform 0.1s;
        }
        .action-btn:active {
            transform: scale(0.95);
        }
        .hint-text {
            font-size: 0.8rem;
            color: #aaa;
            margin-top: 10px;
            font-weight: 400;
        }

        /* Animations */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
        .shake { animation: shake 0.4s ease-in-out; }
        .flash-green { border-bottom-color: var(--success) !important; color: var(--success) !important; }
        .flash-red { border-bottom-color: var(--error) !important; color: var(--error) !important; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="alphabet-tracker" id="tracker"></div>

    <div class="controls">
        <button class="mode-btn active" id="btn-words" onclick="setMode('words')">Lvl 1: Basic Words</button>
        <button class="mode-btn" id="btn-diacritics" onclick="setMode('diacritics')">Lvl 2: Vowels</button>
        <button class="mode-btn" id="btn-consonants" onclick="setMode('consonants')">Lvl 3: All Consonants</button>
    </div>

    <div class="progress-text" id="progress-text">WORD 1 OF 10</div>

    <div class="card">
        <div class="main-word" id="main-word"></div>
        
        <div class="breakdown-area" id="breakdown-area"></div>
        
        <div class="translation hidden" id="translation"></div>

        <button class="action-btn" id="action-btn" onclick="nextStep()">Start Learning</button>
        <div class="hint-text" id="hint-text">Press 'Enter' to advance</div>
    </div>

    <script>
        // --- DATA ---
        const datasets = {
            words: [
                { word: "कल", letters: [{char: "क", roman: "ka"}, {char: "ल", roman: "la"}], roman: "kal", english: "Tomorrow / Yesterday" },
                { word: "घर", letters: [{char: "घ", roman: "gha"}, {char: "र", roman: "ra"}], roman: "ghar", english: "House" },
                { word: "फल", letters: [{char: "फ", roman: "fa"}, {char: "ल", roman: "la"}], roman: "fal", english: "Fruit" },
                { word: "जल", letters: [{char: "ज", roman: "ja"}, {char: "ल", roman: "la"}], roman: "jal", english: "Water" },
                { word: "मन", letters: [{char: "म", roman: "ma"}, {char: "न", roman: "na"}], roman: "man", english: "Mind / Heart" },
                { word: "सब", letters: [{char: "स", roman: "sa"}, {char: "ब", roman: "ba"}], roman: "sab", english: "All / Everyone" },
                { word: "तब", letters: [{char: "त", roman: "ta"}, {char: "ब", roman: "ba"}], roman: "tab", english: "Then" },
                { word: "कब", letters: [{char: "क", roman: "ka"}, {char: "ब", roman: "ba"}], roman: "kab", english: "When" },
                { word: "सच", letters: [{char: "स", roman: "sa"}, {char: "च", roman: "cha"}], roman: "sach", english: "Truth" },
                { word: "बस", letters: [{char: "ब", roman: "ba"}, {char: "स", roman: "sa"}], roman: "bas", english: "Bus / Enough" }
            ],
            diacritics: [
                { word: "क", letters: [{char: "क", roman: "ka"}], roman: "ka", english: "Base Consonant" },
                { word: "का", letters: [{char: "का", roman: "kaa"}], roman: "kaa", english: "Long A sound" },
                { word: "कि", letters: [{char: "कि", roman: "ki"}], roman: "ki", english: "Short I sound" },
                { word: "की", letters: [{char: "की", roman: "kee"}], roman: "kee", english: "Long I sound" },
                { word: "कु", letters: [{char: "कु", roman: "ku"}], roman: "ku", english: "Short U sound" },
                { word: "कू", letters: [{char: "कू", roman: "koo"}], roman: "koo", english: "Long U sound" },
                { word: "के", letters: [{char: "के", roman: "ke"}], roman: "ke", english: "E sound" },
                { word: "कै", letters: [{char: "कै", roman: "kai"}], roman: "kai", english: "AI sound" },
                { word: "को", letters: [{char: "को", roman: "ko"}], roman: "ko", english: "O sound" },
                { word: "कौ", letters: [{char: "कौ", roman: "kau"}], roman: "kau", english: "AU sound" }
            ],
            consonants: [
                { word: "काम", letters: [{char: "का", roman: "kaa"}, {char: "म", roman: "ma"}], roman: "kaam", english: "Work" },
                { word: "खाना", letters: [{char: "खा", roman: "khaa"}, {char: "ना", roman: "naa"}], roman: "khaanaa", english: "Food" },
                { word: "गाना", letters: [{char: "गा", roman: "gaa"}, {char: "ना", roman: "naa"}], roman: "gaanaa", english: "Song" },
                { word: "चाय", letters: [{char: "चा", roman: "chaa"}, {char: "य", roman: "ya"}], roman: "chaay", english: "Tea" },
                { word: "छाता", letters: [{char: "छा", roman: "chhaa"}, {char: "ता", roman: "taa"}], roman: "chhaataa", english: "Umbrella" },
                { word: "झील", letters: [{char: "झी", roman: "jhee"}, {char: "ल", roman: "la"}], roman: "jheel", english: "Lake" },
                { word: "टोपी", letters: [{char: "टो", roman: "to"}, {char: "पी", roman: "pee"}], roman: "topee", english: "Hat" },
                { word: "ठीक", letters: [{char: "ठी", roman: "thee"}, {char: "क", roman: "ka"}], roman: "theek", english: "Okay / Fine" },
                { word: "डाल", letters: [{char: "डा", roman: "daa"}, {char: "ल", roman: "la"}], roman: "daal", english: "Branch" },
                { word: "ढोल", letters: [{char: "ढो", roman: "dho"}, {char: "ल", roman: "la"}], roman: "dhol", english: "Drum" },
                { word: "तोता", letters: [{char: "तो", roman: "to"}, {char: "ता", roman: "taa"}], roman: "totaa", english: "Parrot" },
                { word: "थाली", letters: [{char: "था", roman: "thaa"}, {char: "ली", roman: "lee"}], roman: "thaalee", english: "Plate" },
                { word: "दादा", letters: [{char: "दा", roman: "daa"}, {char: "दा", roman: "daa"}], roman: "daadaa", english: "Grandfather" },
                { word: "धूप", letters: [{char: "धू", roman: "dhoo"}, {char: "प", roman: "pa"}], roman: "dhoop", english: "Sunlight" },
                { word: "नाम", letters: [{char: "ना", roman: "naa"}, {char: "म", roman: "ma"}], roman: "naam", english: "Name" },
                { word: "पानी", letters: [{char: "पा", roman: "paa"}, {char: "नी", roman: "nee"}], roman: "paanee", english: "Water" },
                { word: "बस", letters: [{char: "ब", roman: "ba"}, {char: "स", roman: "sa"}], roman: "bas", english: "Bus / Enough" },
                { word: "भालू", letters: [{char: "भा", roman: "bhaa"}, {char: "लू", roman: "loo"}], roman: "bhaaloo", english: "Bear" },
                { word: "माता", letters: [{char: "मा", roman: "maa"}, {char: "ता", roman: "taa"}], roman: "maataa", english: "Mother" },
                { word: "रात", letters: [{char: "रा", roman: "raa"}, {char: "त", roman: "ta"}], roman: "raat", english: "Night" },
                { word: "लाल", letters: [{char: "ला", roman: "laa"}, {char: "ल", roman: "la"}], roman: "laal", english: "Red" },
                { word: "वन", letters: [{char: "व", roman: "va"}, {char: "न", roman: "na"}], roman: "van", english: "Forest" },
                { word: "शेर", letters: [{char: "शे", roman: "she"}, {char: "र", roman: "ra"}], roman: "sher", english: "Lion" },
                { word: "भाषा", letters: [{char: "भा", roman: "bhaa"}, {char: "षा", roman: "shaa"}], roman: "bhaashaa", english: "Language" },
                { word: "सात", letters: [{char: "सा", roman: "saa"}, {char: "त", roman: "ta"}], roman: "saat", english: "Seven" },
                { word: "हाथ", letters: [{char: "हा", roman: "haa"}, {char: "थ", roman: "tha"}], roman: "haath", english: "Hand" }
            ]
        };

        // Track scores globally
        let scores = {};

        // App State
        let currentMode = 'words';
        let currentList = datasets[currentMode];
        let wordIndex = 0;
        let letterIndex = 0;
        let phase = 'start'; 
        let cardRevealed = false;

        // DOM Elements
        const trackerEl = document.getElementById('tracker');
        const progressEl = document.getElementById('progress-text');
        const mainWordEl = document.getElementById('main-word');
        const breakdownEl = document.getElementById('breakdown-area');
        const translationEl = document.getElementById('translation');
        const actionBtn = document.getElementById('action-btn');
        const hintText = document.getElementById('hint-text');

        // Initialize Tracker
        function initScores() {
            Object.values(datasets).forEach(list => {
                list.forEach(w => {
                    w.letters.forEach(l => {
                        if(scores[l.char] === undefined) scores[l.char] = 10; 
                    });
                });
            });
            updateTracker();
        }

        function updateTracker() {
            trackerEl.innerHTML = '';
            const chars = new Set();
            currentList.forEach(w => w.letters.forEach(l => chars.add(l.char)));
            
            chars.forEach(char => {
                const span = document.createElement('span');
                span.className = 'tracker-char';
                span.innerText = char;
                const score = scores[char] || 10;
                span.style.opacity = Math.max(0.1, score / 100);
                trackerEl.appendChild(span);
            });
        }

        function updateScore(char, isCorrect) {
            let current = scores[char] || 10;
            if (isCorrect) {
                scores[char] = Math.min(100, current + 30);
            } else {
                scores[char] = Math.max(10, current - 20);
            }
            updateTracker();
        }

        window.setMode = function(mode) {
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${mode}`).classList.add('active');
            
            currentMode = mode;
            currentList = datasets[mode];
            wordIndex = 0;
            letterIndex = 0;
            phase = 'teach';
            cardRevealed = false;
            updateTracker();
            render();
        }

        function renderMainWord() {
            const currentItem = currentList[wordIndex];
            mainWordEl.innerHTML = '';
            
            currentItem.letters.forEach((l, idx) => {
                const span = document.createElement('span');
                span.className = 'word-char';
                span.innerText = l.char;
                span.setAttribute('data-roman', l.roman); // For hover tooltip
                
                if (phase === 'review' || phase === 'start') {
                    span.classList.remove('faded');
                } else {
                    if (idx === letterIndex) span.classList.remove('faded');
                    else span.classList.add('faded');
                }
                mainWordEl.appendChild(span);
            });
        }

        function render() {
            const currentItem = currentList[wordIndex];
            progressEl.innerText = `LEVEL ${currentMode === 'words' ? 1 : currentMode === 'diacritics' ? 2 : 3} • WORD ${wordIndex + 1} OF ${currentList.length}`;
            
            translationEl.classList.add('hidden');
            renderMainWord();
            breakdownEl.innerHTML = '';
            hintText.style.display = "block";

            if (phase === 'start') {
                actionBtn.innerText = "Start Learning";
                mainWordEl.innerHTML = "<span class='word-char' data-roman='na'>न</span><span class='word-char' data-roman='ma'>म</span><span class='word-char' data-roman='ste'>स्ते</span>"; 
            }
            else if (phase === 'teach') {
                const activeLetter = currentItem.letters[letterIndex];
                actionBtn.innerText = cardRevealed ? "Next" : "Reveal";
                actionBtn.style.display = cardRevealed ? "block" : "none";
                hintText.innerText = cardRevealed ? "Press 'Enter' to continue" : "Press 'Enter' or click the card to reveal";

                const box = document.createElement('div');
                box.className = 'letter-box clickable';
                
                if (!cardRevealed) {
                    box.innerHTML = `<div class="box-question">?</div>`;
                    box.onclick = () => {
                        cardRevealed = true;
                        render();
                    };
                } else {
                    box.innerHTML = `
                        <div class="box-hindi">${activeLetter.char}</div>
                        <div class="box-roman">${activeLetter.roman}</div>
                    `;
                    box.onclick = nextStep; // Clicking revealed card also advances
                }
                breakdownEl.appendChild(box);
            }
            else if (phase === 'review') {
                actionBtn.innerText = "Quiz Me";
                actionBtn.style.display = "block";
                hintText.innerText = "Press 'Enter' to start quiz";
                translationEl.classList.remove('hidden');
                translationEl.innerHTML = `<strong>${currentItem.roman}</strong><br>${currentItem.english}`;

                currentItem.letters.forEach(l => {
                    const box = document.createElement('div');
                    box.className = 'letter-box';
                    box.innerHTML = `
                        <div class="box-hindi">${l.char}</div>
                        <div class="box-roman">${l.roman}</div>
                    `;
                    breakdownEl.appendChild(box);
                });
            }
            else if (phase === 'quiz') {
                actionBtn.style.display = "none"; 
                hintText.style.display = "none";
                const activeLetter = currentItem.letters[letterIndex];

                const box = document.createElement('div');
                box.className = 'letter-box';
                box.style.cursor = 'default';
                box.innerHTML = `
                    <div class="box-hindi">${activeLetter.char}</div>
                    <input type="text" class="quiz-input" id="quiz-input" autocomplete="off" placeholder="...">
                `;
                breakdownEl.appendChild(box);

                const input = document.getElementById('quiz-input');
                input.focus();
            }
        }

        // --- GLOBAL KEYBOARD LOGIC ---
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                // If in quiz mode, handle answer checking exclusively
                if (phase === 'quiz') {
                    const input = document.getElementById('quiz-input');
                    if (input && document.activeElement === input && !input.disabled && input.value.trim() !== "") {
                        checkAnswer(input.value.trim().toLowerCase(), currentList[wordIndex].letters[letterIndex]);
                    }
                    return;
                }

                // If not in quiz mode, Enter acts as a universal "Next" button
                if (phase === 'start' || phase === 'review') {
                    nextStep();
                } else if (phase === 'teach') {
                    if (!cardRevealed) {
                        cardRevealed = true;
                        render();
                    } else {
                        nextStep();
                    }
                }
            }
        });

        function checkAnswer(val, activeLetter) {
            const input = document.getElementById('quiz-input');
            if (val === activeLetter.roman.toLowerCase()) {
                input.classList.add('flash-green');
                input.disabled = true;
                updateScore(activeLetter.char, true);
                
                setTimeout(() => {
                    letterIndex++;
                    if (letterIndex >= currentList[wordIndex].letters.length) {
                        wordIndex++;
                        if (wordIndex >= currentList.length) {
                            wordIndex = 0; 
                        }
                        letterIndex = 0;
                        phase = 'teach';
                    }
                    render();
                }, 400); // slightly faster transition on correct answer
            } else {
                input.classList.add('shake', 'flash-red');
                updateScore(activeLetter.char, false);
                setTimeout(() => {
                    input.classList.remove('shake', 'flash-red');
                    input.value = '';
                    input.focus();
                }, 500);
            }
        }

        window.nextStep = function() {
            const currentItem = currentList[wordIndex];

            if (phase === 'start') {
                phase = 'teach';
                cardRevealed = false;
            }
            else if (phase === 'teach') {
                if (cardRevealed) {
                    letterIndex++;
                    cardRevealed = false;
                    if (letterIndex >= currentItem.letters.length) {
                        phase = 'review';
                    }
                }
            }
            else if (phase === 'review') {
                phase = 'quiz';
                letterIndex = 0;
            }
            render();
        }

        // Boot
        initScores();
        setMode('words');

    </script>
</body>
</html>
