<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learn Hindi</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;600;700&family=Poppins:wght@400;500;600;700&display=swap');

        :root {
            --bg-color: #fbe6ee;
            --card-bg: #ffffff;
            --text-dark: #1a1a1a;
            --text-grey: #8a8a8a;
            --accent-pink: #d81b60;
            --box-bg: #f4f4f4;
            --success: #4caf50;
            --error: #f44336;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Top Tracker */
        .alphabet-tracker {
            width: 100%;
            background: rgba(0,0,0,0.05);
            padding: 10px 0;
            text-align: center;
            font-family: 'Noto Sans Devanagari', sans-serif;
            font-size: 1.2rem;
            white-space: nowrap;
            overflow-x: auto;
            margin-bottom: 20px;
        }
        .tracker-char {
            margin: 0 5px;
            transition: opacity 0.3s;
            color: var(--text-dark);
        }

        /* Controls */
        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .mode-btn {
            background: rgba(255,255,255,0.5);
            border: 2px solid transparent;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            color: var(--text-grey);
            transition: all 0.2s;
        }
        .mode-btn.active {
            background: var(--card-bg);
            border-color: var(--accent-pink);
            color: var(--accent-pink);
        }

        /* Main UI */
        .progress-text {
            color: #6a6a6a;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 32px;
            padding: 50px 40px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 15px 35px rgba(216, 27, 96, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        /* Massive Devanagari Word */
        .main-word {
            font-family: 'Noto Sans Devanagari', sans-serif;
            font-size: 7rem;
            font-weight: 700;
            line-height: 1;
            margin-bottom: 40px;
            display: flex;
            justify-content: center;
        }
        .word-char {
            transition: opacity 0.3s ease, color 0.3s ease;
        }
        .word-char.faded {
            opacity: 0.15;
        }

        /* Breakdown Boxes */
        .breakdown-area {
            display: flex;
            gap: 20px;
            min-height: 140px;
            justify-content: center;
            align-items: center;
            width: 100%;
            flex-wrap: wrap;
        }

        .letter-box {
            background: var(--box-bg);
            border-radius: 16px;
            width: 100px;
            height: 130px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .letter-box.clickable:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .box-hindi {
            font-family: 'Noto Sans Devanagari', sans-serif;
            font-size: 3rem;
            font-weight: 700;
            color: var(--accent-pink);
            line-height: 1.2;
        }
        .box-roman {
            font-size: 1.2rem;
            color: var(--text-grey);
            margin-top: 5px;
        }
        .box-question {
            font-size: 4rem;
            color: #ccc;
            font-weight: 700;
        }

        /* Quiz Input */
        .quiz-input {
            width: 80%;
            background: transparent;
            border: none;
            border-bottom: 3px solid #ccc;
            text-align: center;
            font-size: 1.5rem;
            font-family: 'Poppins', sans-serif;
            color: var(--accent-pink);
            padding: 5px;
            outline: none;
            transition: border-color 0.3s;
        }
        .quiz-input:focus {
            border-bottom-color: var(--accent-pink);
        }

        /* Review Translation */
        .translation {
            margin-top: 20px;
            text-align: center;
            font-size: 1.4rem;
            color: var(--text-grey);
            font-weight: 500;
        }

        /* Action Button */
        .action-btn {
            margin-top: 40px;
            background: var(--accent-pink);
            color: white;
            border: none;
            padding: 16px 40px;
            font-size: 1.2rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            transition: background 0.2s, transform 0.1s;
        }
        .action-btn:active {
            transform: scale(0.95);
        }

        /* Animations */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
        .shake { animation: shake 0.4s ease-in-out; }
        .flash-green { border-bottom-color: var(--success) !important; color: var(--success) !important; }
        .flash-red { border-bottom-color: var(--error) !important; color: var(--error) !important; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="alphabet-tracker" id="tracker"></div>

    <div class="controls">
        <button class="mode-btn active" id="btn-words" onclick="setMode('words')">Basic Words</button>
        <button class="mode-btn" id="btn-diacritics" onclick="setMode('diacritics')">Vowel Diacritics</button>
    </div>

    <div class="progress-text" id="progress-text">WORD 1 OF 10</div>

    <div class="card">
        <div class="main-word" id="main-word"></div>
        
        <div class="breakdown-area" id="breakdown-area"></div>
        
        <div class="translation hidden" id="translation"></div>

        <button class="action-btn" id="action-btn" onclick="nextStep()">Start Learning</button>
    </div>

    <script>
        // --- DATA ---
        const datasets = {
            words: [
                { word: "कल", letters: [{char: "क", roman: "ka"}, {char: "ल", roman: "la"}], roman: "kal", english: "Tomorrow / Yesterday" },
                { word: "घर", letters: [{char: "घ", roman: "gha"}, {char: "र", roman: "ra"}], roman: "ghar", english: "House" },
                { word: "फल", letters: [{char: "फ", roman: "fa"}, {char: "ल", roman: "la"}], roman: "fal", english: "Fruit" },
                { word: "जल", letters: [{char: "ज", roman: "ja"}, {char: "ल", roman: "la"}], roman: "jal", english: "Water" },
                { word: "मन", letters: [{char: "म", roman: "ma"}, {char: "न", roman: "na"}], roman: "man", english: "Mind / Heart" },
                { word: "सब", letters: [{char: "स", roman: "sa"}, {char: "ब", roman: "ba"}], roman: "sab", english: "All / Everyone" },
                { word: "तब", letters: [{char: "त", roman: "ta"}, {char: "ब", roman: "ba"}], roman: "tab", english: "Then" },
                { word: "कब", letters: [{char: "क", roman: "ka"}, {char: "ब", roman: "ba"}], roman: "kab", english: "When" },
                { word: "सच", letters: [{char: "स", roman: "sa"}, {char: "च", roman: "cha"}], roman: "sach", english: "Truth" },
                { word: "बस", letters: [{char: "ब", roman: "ba"}, {char: "स", roman: "sa"}], roman: "bas", english: "Bus / Enough" }
            ],
            diacritics: [
                { word: "क", letters: [{char: "क", roman: "ka"}], roman: "ka", english: "Base Consonant" },
                { word: "का", letters: [{char: "का", roman: "kaa"}], roman: "kaa", english: "Long A sound" },
                { word: "कि", letters: [{char: "कि", roman: "ki"}], roman: "ki", english: "Short I sound" },
                { word: "की", letters: [{char: "की", roman: "kee"}], roman: "kee", english: "Long I sound" },
                { word: "कु", letters: [{char: "कु", roman: "ku"}], roman: "ku", english: "Short U sound" },
                { word: "कू", letters: [{char: "कू", roman: "koo"}], roman: "koo", english: "Long U sound" },
                { word: "के", letters: [{char: "के", roman: "ke"}], roman: "ke", english: "E sound" },
                { word: "कै", letters: [{char: "कै", roman: "kai"}], roman: "kai", english: "AI sound" },
                { word: "को", letters: [{char: "को", roman: "ko"}], roman: "ko", english: "O sound" },
                { word: "कौ", letters: [{char: "कौ", roman: "kau"}], roman: "kau", english: "AU sound" }
            ]
        };

        // Track scores globally
        let scores = {};

        // App State
        let currentMode = 'words';
        let currentList = datasets[currentMode];
        let wordIndex = 0;
        let letterIndex = 0;
        let phase = 'start'; // start, teach, review, quiz
        let cardRevealed = false;

        // DOM
        const trackerEl = document.getElementById('tracker');
        const progressEl = document.getElementById('progress-text');
        const mainWordEl = document.getElementById('main-word');
        const breakdownEl = document.getElementById('breakdown-area');
        const translationEl = document.getElementById('translation');
        const actionBtn = document.getElementById('action-btn');

        // Init unique characters for tracker
        function initScores() {
            Object.values(datasets).forEach(list => {
                list.forEach(w => {
                    w.letters.forEach(l => {
                        if(scores[l.char] === undefined) scores[l.char] = 10; // Start at 10% opacity
                    });
                });
            });
            updateTracker();
        }

        function updateTracker() {
            trackerEl.innerHTML = '';
            // Get unique chars for current mode
            const chars = new Set();
            currentList.forEach(w => w.letters.forEach(l => chars.add(l.char)));
            
            chars.forEach(char => {
                const span = document.createElement('span');
                span.className = 'tracker-char';
                span.innerText = char;
                const score = scores[char] || 10;
                span.style.opacity = Math.max(0.1, score / 100);
                trackerEl.appendChild(span);
            });
        }

        function updateScore(char, isCorrect) {
            let current = scores[char] || 10;
            if (isCorrect) {
                scores[char] = Math.min(100, current + 30);
            } else {
                scores[char] = Math.max(10, current - 20);
            }
            updateTracker();
        }

        window.setMode = function(mode) {
            document.getElementById('btn-words').classList.remove('active');
            document.getElementById('btn-diacritics').classList.remove('active');
            document.getElementById(`btn-${mode}`).classList.add('active');
            
            currentMode = mode;
            currentList = datasets[mode];
            wordIndex = 0;
            letterIndex = 0;
            phase = 'teach';
            updateTracker();
            render();
        }

        function renderMainWord() {
            const currentItem = currentList[wordIndex];
            mainWordEl.innerHTML = '';
            
            currentItem.letters.forEach((l, idx) => {
                const span = document.createElement('span');
                span.className = 'word-char';
                span.innerText = l.char;
                
                // Highlight logic based on phase
                if (phase === 'review' || phase === 'start') {
                    span.classList.remove('faded');
                } else {
                    if (idx === letterIndex) span.classList.remove('faded');
                    else span.classList.add('faded');
                }
                mainWordEl.appendChild(span);
            });
        }

        function render() {
            const currentItem = currentList[wordIndex];
            const typeText = currentMode === 'words' ? 'WORD' : 'LESSON';
            progressEl.innerText = `${typeText} ${wordIndex + 1} OF ${currentList.length}`;
            
            translationEl.classList.add('hidden');
            renderMainWord();
            breakdownEl.innerHTML = '';

            if (phase === 'start') {
                actionBtn.innerText = "Start Learning";
                mainWordEl.innerHTML = "नमस्ते"; // Namaste
            }
            else if (phase === 'teach') {
                const activeLetter = currentItem.letters[letterIndex];
                actionBtn.innerText = cardRevealed ? "Next" : "Click card to reveal";
                actionBtn.style.display = cardRevealed ? "block" : "none";

                const box = document.createElement('div');
                box.className = 'letter-box clickable';
                
                if (!cardRevealed) {
                    box.innerHTML = `<div class="box-question">?</div>`;
                    box.onclick = () => {
                        cardRevealed = true;
                        render();
                    };
                } else {
                    box.innerHTML = `
                        <div class="box-hindi">${activeLetter.char}</div>
                        <div class="box-roman">${activeLetter.roman}</div>
                    `;
                }
                breakdownEl.appendChild(box);
            }
            else if (phase === 'review') {
                actionBtn.innerText = "Quiz Me";
                actionBtn.style.display = "block";
                translationEl.classList.remove('hidden');
                translationEl.innerHTML = `<strong>${currentItem.roman}</strong><br>${currentItem.english}`;

                currentItem.letters.forEach(l => {
                    const box = document.createElement('div');
                    box.className = 'letter-box';
                    box.innerHTML = `
                        <div class="box-hindi">${l.char}</div>
                        <div class="box-roman">${l.roman}</div>
                    `;
                    breakdownEl.appendChild(box);
                });
            }
            else if (phase === 'quiz') {
                actionBtn.style.display = "none"; // Hide button, rely on Enter key
                const activeLetter = currentItem.letters[letterIndex];

                const box = document.createElement('div');
                box.className = 'letter-box';
                box.style.cursor = 'default';
                box.innerHTML = `
                    <div class="box-hindi">${activeLetter.char}</div>
                    <input type="text" class="quiz-input" id="quiz-input" autocomplete="off" placeholder="...">
                `;
                breakdownEl.appendChild(box);

                const input = document.getElementById('quiz-input');
                input.focus();

                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') {
                        checkAnswer(input.value.trim().toLowerCase(), activeLetter);
                    }
                });
            }
        }

        function checkAnswer(val, activeLetter) {
            const input = document.getElementById('quiz-input');
            if (val === activeLetter.roman.toLowerCase()) {
                input.classList.add('flash-green');
                input.disabled = true;
                updateScore(activeLetter.char, true);
                
                setTimeout(() => {
                    letterIndex++;
                    if (letterIndex >= currentList[wordIndex].letters.length) {
                        wordIndex++;
                        if (wordIndex >= currentList.length) {
                            wordIndex = 0; // Loop back or show completion
                        }
                        letterIndex = 0;
                        phase = 'teach';
                    }
                    render();
                }, 600);
            } else {
                input.classList.add('shake', 'flash-red');
                updateScore(activeLetter.char, false);
                setTimeout(() => {
                    input.classList.remove('shake', 'flash-red');
                    input.value = '';
                    input.focus();
                }, 500);
            }
        }

        window.nextStep = function() {
            const currentItem = currentList[wordIndex];

            if (phase === 'start') {
                phase = 'teach';
                cardRevealed = false;
            }
            else if (phase === 'teach') {
                if (cardRevealed) {
                    letterIndex++;
                    cardRevealed = false;
                    if (letterIndex >= currentItem.letters.length) {
                        phase = 'review';
                    }
                }
            }
            else if (phase === 'review') {
                phase = 'quiz';
                letterIndex = 0;
            }
            render();
        }

        // Boot
        initScores();
        setMode('words');

    </script>
</body>
</html>
